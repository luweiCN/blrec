<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BLREC 高光助手设置</title>
    <link rel="stylesheet" href="options.css" />
    <script src="options.js" defer></script>
  </head>
  <body>
    <main>
      <h1>连接 BLREC</h1>
      <form id="connection-form">
        <label for="backend-url">BLREC 地址</label>
        <input
          id="backend-url"
          name="backendUrl"
          type="text"
          inputmode="url"
          placeholder="http://192.168.50.24:2233"
          required
        />
        <label for="username">管理员用户名</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          maxlength="64"
          required
        />
        <button id="connect" type="submit">连接</button>
      </form>
      <p id="connection-status" role="status" aria-live="polite"></p>
    </main>
  </body>
</html>
