name: Test

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.10', '3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install '.[dev]'

      - name: Test
        run: python -m pytest

      - name: Check formatting
        run: black --check src tests

      - name: Check import order
        run: isort --check-only src tests

      - name: Lint
        run: flake8 src tests

      - name: Type check
        if: matrix.python-version == '3.8'
        run: mypy src/blrec

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build

  extension:
    name: Browser extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Test extension
        run: npm test

      - name: Type check extension
        run: npm run typecheck

      - name: Build extension
        run: npm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg VERSION=3.0.0-beta.12 --build-arg REVISION=${{ github.sha }} -t blrec:release-test .

      - name: Smoke test Docker image
        run: scripts/docker-smoke.sh blrec:release-test
