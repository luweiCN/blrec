name: Publish Docker release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/test.yml

  publish:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      IMAGE: ghcr.io/luweicn/blrec
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version="$(python -c "import sys; sys.path.insert(0, 'src'); import blrec; print(blrec.__version__)")"
          test "$version" = "$package_version"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js for extension
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json

      - name: Build browser extension release asset
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          manifest_version="$(python - "$version" <<'PY'
          import re
          import sys

          value = sys.argv[1]
          match = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)(?:-beta\.(\d+))?', value)
          if match is None:
              raise SystemExit('unsupported extension version: ' + value)
          parts = [match.group(1), match.group(2), match.group(3)]
          if match.group(4) is not None:
              parts.append(match.group(4))
          print('.'.join(parts))
          PY
          )"
          cd browser-extension
          npm ci
          BLREC_EXTENSION_VERSION="$manifest_version" npm run build
          cd dist
          zip -r "../../blrec-highlight-extension-${{ steps.version.outputs.value }}.zip" .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            REVISION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE }}:beta
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify manifest platforms
        shell: bash
        run: |
          docker buildx imagetools inspect --raw "$IMAGE:${{ steps.version.outputs.value }}" > manifest.json
          python - <<'PY'
          import json
          manifest = json.load(open('manifest.json', encoding='utf8'))
          platforms = {
              (item.get('platform') or {}).get('os', '') + '/' +
              (item.get('platform') or {}).get('architecture', '')
              for item in manifest.get('manifests', [])
          }
          assert {'linux/amd64', 'linux/arm64'} <= platforms, platforms
          PY

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            compose.synology.yml synology.env.example \
            "blrec-highlight-extension-${{ steps.version.outputs.value }}.zip" \
            --verify-tag \
            --prerelease \
            --title "BLREC ${{ steps.version.outputs.value }}" \
            --notes-file "docs/releases/${{ steps.version.outputs.value }}.md"
