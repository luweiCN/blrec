<div
  class="empty-container"
  *ngIf="visibleDataList.length === 0; else taskList"
>
  <nz-empty></nz-empty>
</div>

<ng-template #taskList>
  <div
    *ngIf="selectedCount > 0"
    class="batch-action-bar"
    data-testid="recording-task-batch-actions"
  >
    <strong>已选择 {{ selectedCount }} 个房间</strong>
    <button
      nz-button
      nzSize="small"
      type="button"
      [nzLoading]="batchSettingsLoading"
      (click)="openBatchSettingsDialog()"
    >
      录制设置
    </button>
    <button
      nz-button
      nzSize="small"
      type="button"
      (click)="openBatchUploadPolicyDialog()"
    >
      投稿设置
    </button>
    <button
      *ngIf="eligibleCount('start') > 0"
      nz-button
      nzSize="small"
      type="button"
      (click)="runBatchAction('start')"
    >
      开启监控与录制（{{ eligibleCount("start") }}）
    </button>
    <button
      *ngIf="eligibleCount('stop') > 0"
      nz-button
      nzSize="small"
      type="button"
      (click)="runBatchAction('stop')"
    >
      停止监控与录制（{{ eligibleCount("stop") }}）
    </button>
    <button
      nz-button
      nzSize="small"
      type="button"
      (click)="runBatchAction('refresh')"
    >
      刷新所选房间
    </button>
    <button
      nz-button
      nzDanger
      nzSize="small"
      type="button"
      (click)="runBatchAction('delete')"
    >
      删除
    </button>
  </div>

  <div class="task-table" role="table" aria-label="房间管理列表">
    <div class="task-list-header" role="row">
      <div role="columnheader">
        <label
          nz-checkbox
          aria-label="选择当前列表全部房间"
          [ngModel]="allSelected"
          [nzIndeterminate]="someSelected"
          (ngModelChange)="setAllSelected($event)"
        ></label>
      </div>
      <div role="columnheader">直播间</div>
      <div role="columnheader">监控与录制</div>
      <div role="columnheader">投稿安排</div>
      <div role="columnheader">操作</div>
    </div>
    <app-task-item
      *ngFor="let data of visibleDataList; trackBy: trackByRoomId"
      role="row"
      [data]="data"
      [uploadPolicy]="policyFor(data.room_info.room_id)"
      [collectionLabel]="collectionLabelFor(policyFor(data.room_info.room_id))"
      [selected]="isSelected(data.room_info.room_id)"
      (selectedChange)="setTaskSelected(data.room_info.room_id, $event)"
      (uploadPolicyChanged)="requestPolicyRefresh()"
    ></app-task-item>
  </div>
</ng-template>

<ng-container *ngIf="batchTaskOptions && batchGlobalSettings">
  <app-task-settings-dialog
    [title]="'批量录制设置 · ' + selectedCount + ' 个房间'"
    [taskOptions]="batchTaskOptions"
    [globalSettings]="batchGlobalSettings"
    [(visible)]="batchSettingsDialogVisible"
    (confirm)="changeBatchTaskOptions($event)"
    (afterClose)="cleanBatchSettingsData()"
  ></app-task-settings-dialog>
</ng-container>

<app-upload-policy-dialog
  *ngIf="batchUploadPolicyDialogVisible && selectedReferenceTask as reference"
  [roomId]="reference.room_info.room_id"
  [roomIds]="selectedRoomIdsArray"
  [roomName]="reference.user_info.name"
  [liveAreaName]="reference.room_info.area_name"
  [liveParentAreaName]="reference.room_info.parent_area_name"
  (closed)="closeBatchUploadPolicyDialog()"
></app-upload-policy-dialog>
