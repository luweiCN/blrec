<div class="tasks-page">
  <header class="tasks-page-header">
    <h2>房间管理</h2>
    <p>管理直播间的监控录制状态和自动投稿设置</p>
  </header>
  <div class="tasks-page-content">
    <app-toolbar
      [selection]="selection"
      (selectionChange)="onSelectionChanged($event)"
      [reverse]="reverse"
      (reverseChange)="onReverseChanged($event)"
      (filterChange)="filterTerm = $event"
      [automaticSubmissionFilter]="automaticSubmissionFilter"
      (automaticSubmissionFilterChange)="automaticSubmissionFilter = $event"
      [submissionVisibilityFilter]="submissionVisibilityFilter"
      (submissionVisibilityFilterChange)="submissionVisibilityFilter = $event"
      [submissionAccountFilter]="submissionAccountFilter"
      (submissionAccountFilterChange)="submissionAccountFilter = $event"
      [submissionAccountOptions]="submissionAccountOptions"
    ></app-toolbar>

    <nz-spin
      class="spinner"
      [nzSize]="'large'"
      [nzSpinning]="loading"
      *ngIf="loading; else elseBlock"
    ></nz-spin>
    <ng-template #elseBlock>
      <app-task-list
        [dataList]="dataList | filterTasks: filterTerm"
        [automaticSubmissionFilter]="automaticSubmissionFilter"
        [submissionVisibilityFilter]="submissionVisibilityFilter"
        [submissionAccountFilter]="submissionAccountFilter"
        [roomUploadPolicies]="roomUploadPolicies"
        (roomUploadPoliciesRefresh)="refreshRoomUploadPolicies()"
      ></app-task-list>
    </ng-template>
  </div>
</div>

<button
  class="add-task-button"
  nz-button
  nzType="primary"
  nzSize="large"
  nzShape="circle"
  nz-tooltip
  nzTooltipTitle="添加任务"
  (click)="addTaskDialog.open()"
>
  <i nz-icon nzType="plus"></i>
</button>
<app-add-task-dialog #addTaskDialog></app-add-task-dialog>
