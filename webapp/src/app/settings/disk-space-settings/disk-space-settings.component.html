<form nz-form [formGroup]="settingsForm">
  <nz-alert
    *ngIf="retentionStatus?.capacityBytes"
    class="capacity-status"
    nzShowIcon
    [nzType]="retentionStatus?.warning ? 'warning' : 'info'"
    [nzMessage]="retentionStatus?.warning ? '录像容量即将达到上限' : '录像容量正常'"
    [nzDescription]="
      '已使用 ' +
      formatBytes(retentionStatus!.managedVideoBytes) +
      ' / ' +
      formatBytes(retentionStatus!.capacityBytes) +
      '，剩余 ' +
      formatBytes(retentionStatus!.remainingBytes)
    "
  ></nz-alert>
  <nz-form-item class="setting-item">
    <nz-form-label class="setting-label" nzNoColon
      >硬盘空间检测间隔</nz-form-label
    >
    <nz-form-control
      class="setting-control select"
      [nzWarningTip]="syncFailedWarningTip"
      [nzValidateStatus]="
        syncStatus.checkInterval ? checkIntervalControl : 'warning'
      "
    >
      <nz-select formControlName="checkInterval" [nzOptions]="intervalOptions">
      </nz-select>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item class="setting-item">
    <nz-form-label class="setting-label" nzNoColon
      >硬盘空间检测阈值</nz-form-label
    >
    <nz-form-control
      class="setting-control select"
      [nzWarningTip]="syncFailedWarningTip"
      [nzValidateStatus]="
        syncStatus.spaceThreshold ? spaceThresholdControl : 'warning'
      "
    >
      <nz-select
        formControlName="spaceThreshold"
        [nzOptions]="thresholdOptions"
      >
      </nz-select>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item class="setting-item" appSwitchActionable>
    <nz-form-label class="setting-label" nzNoColon
      >空间不足删除旧录播文件</nz-form-label
    >
    <nz-form-control
      class="setting-control switch"
      [nzWarningTip]="syncFailedWarningTip"
      [nzValidateStatus]="
        syncStatus.recycleRecords ? recycleRecordsControl : 'warning'
      "
    >
      <nz-switch formControlName="recycleRecords"></nz-switch>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item class="setting-item">
    <nz-form-label class="setting-label" nzNoColon>录像容量上限</nz-form-label>
    <nz-form-control
      class="setting-control select"
      nzExtra="仅房间选择“容量超限时清理”后生效；只删除已投稿的视频，弹幕文件会保留。"
      [nzWarningTip]="syncFailedWarningTip"
      [nzValidateStatus]="
        syncStatus.recordingCapacity ? recordingCapacityControl : 'warning'
      "
    >
      <nz-select
        formControlName="recordingCapacity"
        [nzOptions]="capacityOptions"
      ></nz-select>
    </nz-form-control>
  </nz-form-item>
  <nz-form-item class="setting-item">
    <nz-form-label class="setting-label" nzNoColon>容量剩余预警</nz-form-label>
    <nz-form-control
      class="setting-control select"
      nzExtra="录像容量距离上限不足该数值时，页面会显示预警。"
      [nzWarningTip]="syncFailedWarningTip"
      [nzValidateStatus]="
        syncStatus.capacityWarningThreshold
          ? capacityWarningThresholdControl
          : 'warning'
      "
    >
      <nz-select
        formControlName="capacityWarningThreshold"
        [nzOptions]="capacityWarningOptions"
      ></nz-select>
    </nz-form-control>
  </nz-form-item>
  <div class="capacity-status-action">
    <button
      nz-button
      type="button"
      nzSize="small"
      [nzLoading]="retentionStatusLoading"
      (click)="refreshRetentionStatus()"
    >
      刷新容量状态
    </button>
  </div>
</form>
