<nz-modal
  [nzTitle]="title"
  [nzVisible]="visible"
  [nzFooter]="null"
  nzWidth="1040px"
  (nzOnCancel)="handleClose()"
>
  <ng-container *nzModalContent>
    <div *ngIf="loading" class="loading-state">正在打开本地视频…</div>
    <nz-alert
      *ngIf="error"
      nzType="error"
      nzShowIcon
      [nzMessage]="error"
    ></nz-alert>
    <video
      *ngIf="mediaUrl && !error"
      #videoElement
      data-testid="part-video"
      controls
      preload="metadata"
      [attr.src]="isFlv ? null : mediaUrl"
      (loadedmetadata)="handleMediaMetadataLoaded()"
      (loadeddata)="handleFirstFrame()"
      (canplay)="handleMediaCanPlay()"
      (playing)="handleFirstFrame()"
      (pause)="handleMediaPause()"
      (ended)="handleMediaEnded()"
      (timeupdate)="handleTimeUpdate()"
      (volumechange)="handleVolumeChange($event)"
      (ratechange)="handlePlaybackRateChange($event)"
      (error)="handleNativeMediaError()"
      (stalled)="handleNativeMediaStalled()"
    ></video>
    <div *ngIf="mediaUrl && !error" class="playback-options">
      <label>
        <span>播放速度</span>
        <select
          aria-label="播放速度"
          [value]="playbackRate"
          (change)="setPlaybackRate($any($event.target).value)"
        >
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1">1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </label>
    </div>
    <p *ngIf="mediaUrl && !error" class="hint">
      空格播放/暂停 · ←/→ 快退快进 · ↑/↓ 调节音量 · M 静音
    </p>
    <p *ngIf="mediaAccess?.snapshotId" class="hint">
      当前可播放至打开播放器时的录制进度；重新打开可读取新增内容。
    </p>
    <section class="danmaku-panel" aria-label="弹幕列表">
      <header class="danmaku-header">
        <div>
          <strong>弹幕</strong>
          <span class="danmaku-count" *ngIf="danmakuItems.length > 0">
            当前显示 {{ danmakuItems.length }} 条
          </span>
        </div>
        <button
          *ngIf="!followDanmaku"
          nz-button
          nzType="link"
          nzSize="small"
          type="button"
          (click)="resumeDanmakuFollow()"
        >
          恢复跟随播放
        </button>
        <span *ngIf="followDanmaku" class="follow-state">跟随播放</span>
      </header>
      <nz-alert
        *ngIf="danmakuError"
        nzType="warning"
        nzShowIcon
        [nzMessage]="danmakuError"
      ></nz-alert>
      <div *ngIf="danmakuLoading && danmakuItems.length === 0" class="danmaku-empty">
        正在加载弹幕…
      </div>
      <div
        *ngIf="!danmakuLoading && !danmakuError && danmakuItems.length === 0"
        class="danmaku-empty"
      >
        该分 P 没有可显示的弹幕
      </div>
      <div
        *ngIf="danmakuItems.length > 0"
        #danmakuList
        data-testid="danmaku-list"
        class="danmaku-list"
        (wheel)="pauseDanmakuFollow()"
        (touchstart)="pauseDanmakuFollow()"
      >
        <button
          *ngFor="let item of danmakuItems; let index = index"
          type="button"
          data-testid="danmaku-line"
          class="danmaku-line"
          [class.active]="activeDanmakuIndex === index"
          [attr.data-danmaku-index]="index"
          (click)="seekDanmaku(item, index)"
        >
          <time>{{ formatDanmakuTime(item.progressMs) }}</time>
          <span class="danmaku-user">{{ item.user || "匿名观众" }}</span>
          <span class="danmaku-content">{{ item.content }}</span>
        </button>
      </div>
      <button
        *ngIf="danmakuNextCursor !== null"
        nz-button
        nzType="link"
        type="button"
        [disabled]="danmakuLoading"
        (click)="loadMoreDanmaku()"
      >
        {{ danmakuLoading ? "正在加载…" : "加载更多弹幕" }}
      </button>
    </section>
  </ng-container>
</nz-modal>
